<!DOCTYPE html>
<html>
<head><title>AskMyPDF</title></head>
<body>

    <h1>AskMyPDF</h1>

    <!-- upload form -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Title (optional)">
        <input type="file" name="pdf" accept=".pdf" required>
        <button type="submit">Upload & Process</button>
    </form>

    <!-- chat list -->
    <hr>
    <h2>Previous Chats</h2>
    {% if chats %}
        <ul>
            {% for chat in chats %}
                <li>
                    <a href="{% url 'chat_detail' chat.id %}">
                        {{ chat.title }}
                    </a>
                    <small>{{ chat.created_at|date:"M d, Y" }}</small>
                    {% if not chat.is_processed %}
                        <span>processing...</span>
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No chats yet. Upload a PDF to get started.</p>
    {% endif %}

</body>
</html>
