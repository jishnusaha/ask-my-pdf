<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyPDF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a1a;
            color: #ececec;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: #111;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a2a;
        }

        #sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        #new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            color: #ececec;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        #new-chat-btn:hover { background: #333; }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: block;
            padding: 10px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #ccc;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .chat-item:hover { background: #2a2a2a; color: #fff; }
        .chat-item.active { background: #2a2a2a; color: #fff; }

        .chat-item .date {
            display: block;
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        /* ── Main content ── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-header">
            <a href="{% url 'chat_list_create' %}" id="new-chat-btn">
                ✏️ New Chat
            </a>
        </div>

        <div id="chat-list">
            {% for chat in all_chats %}
                <a
                    href="{% url 'chat_detail' chat.id %}"
                    class="chat-item {% if active_chat_id == chat.id %}active{% endif %}"
                >
                    {{ chat.title }}
                    <span class="date">{{ chat.created_at|date:"M d, Y" }}</span>
                </a>
            {% empty %}
                <p style="padding: 12px; color: #555; font-size: 13px;">No chats yet.</p>
            {% endfor %}
        </div>
    </div>

    <!-- Main -->
    <div id="main">
        {% block main %}{% endblock %}
    </div>

</body>
</html>
